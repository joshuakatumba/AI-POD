<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI POD{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f4ff;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f4ff;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;max-width:600px;width:100%;box-shadow:0 2px 12px rgba(79,70,229,0.08);">
          <!-- Header -->
          <tr>
            <td style="background-color:#4f46e5;padding:28px 40px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <div style="width:44px;height:44px;background-color:rgba(255,255,255,0.18);border-radius:10px;display:inline-block;text-align:center;line-height:44px;">
                      <span style="color:#ffffff;font-size:16px;font-weight:900;letter-spacing:0.5px;">AP</span>
                    </div>
                  </td>
                  <td style="vertical-align:middle;padding-left:14px;">
                    <p style="margin:0;color:#ffffff;font-size:17px;font-weight:700;letter-spacing:0.3px;">AI POD</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f8f9ff;padding:20px 40px;border-top:1px solid #e8e8f0;">
              <p style="margin:0;color:#9ca3af;font-size:12px;text-align:center;">
                This email was sent by AI POD. If you did not expect this email, please ignore it.
              </p>
              <p style="margin:8px 0 0;color:#9ca3af;font-size:12px;text-align:center;">
                &copy; 2026 AI POD. All rights reserved.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
