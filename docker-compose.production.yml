services:
  app:
    command: >
      gunicorn --chdir /usr/src/app core.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers 4
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=core.settings.production
    volumes:
      - static_volume:/usr/src/app/staticfiles

volumes:
  static_volume: