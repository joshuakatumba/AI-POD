  #     - name: Enable pnpm via Corepack
  #       run: |
  #         corepack enable
  #         corepack prepare pnpm@9 --activate

  #     - run: pnpm install --frozen-lockfile
  #     - run: pnpm lint

  types:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    needs: [types]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm build