{% extends "base.html" %}
{% block title %}新しいタスクの割り当て{% endblock %}
{% block content %}
  <h1 style="margin:0 0 16px;color:#1f2937;font-size:22px;font-weight:700;">新しいタスクが割り当てられました！</h1>
  <p style="margin:0 0 12px;color:#4b5563;font-size:15px;line-height:1.6;">
    こんにちは {{ full_name }} さん。<strong>{{ assigner_name }}</strong> さんがあなたをタスク「<strong>{{ task_name }}</strong>」に割り当てました。
  </p>
  <p style="margin:0 0 32px;color:#4b5563;font-size:15px;line-height:1.6;">
    以下のボタンをクリックして、タスクの詳細を確認してください。
  </p>
  <table cellpadding="0" cellspacing="0">
    <tr>
      <td style="border-radius:10px;background-color:#4f46e5;">
        <a href="{{ task_link }}"
           style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;border-radius:10px;">
          タスクを表示
        </a>
      </td>
    </tr>
  </table>
  <p style="margin:32px 0 0;color:#9ca3af;font-size:13px;">
    または、このリンクをブラウザにコピーしてください:<br>
    <a href="{{ task_link }}" style="color:#4f46e5;word-break:break-all;">{{ task_link }}</a>
  </p>
{% endblock %}
