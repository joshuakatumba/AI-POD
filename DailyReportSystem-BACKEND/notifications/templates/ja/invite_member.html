{% extends "base.html" %}
{% block title %}招待が届きました{% endblock %}
{% block content %}
  <h1 style="margin:0 0 16px;color:#1f2937;font-size:22px;font-weight:700;">招待が届きました！</h1>
  <p style="margin:0 0 12px;color:#4b5563;font-size:15px;line-height:1.6;">
    {{ full_name }} 様、<strong>{{ organization_name }}</strong>への招待が届いています。
  </p>
  <p style="margin:0 0 32px;color:#4b5563;font-size:15px;line-height:1.6;">
    下のボタンをクリックしてログインし、利用を開始してください。
  </p>
  <table cellpadding="0" cellspacing="0">
    <tr>
      <td style="border-radius:10px;background-color:#4f46e5;">
        <a href="{{ login_link }}"
           style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;border-radius:10px;">
          ログイン
        </a>
      </td>
    </tr>
  </table>
  <p style="margin:32px 0 0;color:#9ca3af;font-size:13px;">
    または、以下のリンクをブラウザにコピーしてください：<br>
    <a href="{{ login_link }}" style="color:#4f46e5;word-break:break-all;">{{ login_link }}</a>
  </p>
  <p style="margin:24px 0 0;color:#9ca3af;font-size:13px;">
    この招待に心当たりがない場合は、このメールを無視してください。
  </p>
{% endblock %}
