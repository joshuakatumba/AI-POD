services:
  app:
    command: >
      gunicorn --chdir /usr/src/app core.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 1 --reload
    volumes:
      - ./:/usr/src/app
      - static_volume:/usr/src/app/staticfiles
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=core.settings.development
      - REDIS_URL=redis://redis:6379/0

  celery_worker:
    command: celery -A core worker -l info
    volumes:
      - ./:/usr/src/app
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=core.settings.development
      - REDIS_URL=redis://redis:6379/0

  flower:
    command: celery -A core flower --port=5555
    volumes:
      - ./:/usr/src/app
      - static_volume:/usr/src/app/staticfiles
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=core.settings.development
      - FIELD_ENCRYPTION_KEY=Y2uR9Umaqp87Rx9py8QamGsyXW8PC7hBvtLjrx3KOwU=
      - REDIS_URL=redis://redis:6379/0

volumes:
  static_volume:
