services:
  app:
    command: >
      gunicorn --chdir /usr/src/app core.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 4
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=core.settings.production
      - FIELD_ENCRYPTION_KEY=Y2uR9Umaqp87Rx9py8QamGsyXW8PC7hBvtLjrx3KOwU=
    volumes:
      - static_volume:/usr/src/app/staticfiles

volumes:
  static_volume:
